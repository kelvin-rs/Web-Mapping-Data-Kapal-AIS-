<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Badan EPIRB (Cylindrical Body) - High Contrast -->
  <rect x="19" y="26" width="10" height="15" rx="2" 
        fill="#FF0000" 
        fill-opacity="0.35" 
        stroke="#7B0000" 
        stroke-width="2.5"/>
  
  <!-- Antena Pemancar (Bolder) -->
  <line x1="24" y1="26" x2="24" y2="8" 
        stroke="#7B0000" 
        stroke-width="2.8" 
        stroke-linecap="round"/>
  
  <!-- Sinyal Transmisi Satelit (Vivid Arcs) -->
  <g stroke="#7B0000" stroke-width="2.2" stroke-linecap="round">
    <path d="M16 14C16 14 20 9 24 9C28 9 32 14 32 14" stroke-opacity="0.9"/>
    <path d="M11 19C11 19 17 12 24 12C31 12 37 19 37 19" stroke-opacity="0.5"/>
  </g>

  <!-- Lampu Strobe (High Visibility Point) -->
  <circle cx="24" cy="26" r="2.5" fill="white" stroke="#7B0000" stroke-width="1"/>
</svg>
