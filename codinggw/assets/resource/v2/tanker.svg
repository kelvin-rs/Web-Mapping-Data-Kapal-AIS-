<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Lambung Kapal Oval (Hull) - High Contrast -->
  <path d="M24 4C14 4 14 10 14 10V38C14 38 14 44 24 44C34 44 34 38 34 38V10C34 10 34 4 24 4Z" 
        fill="#E74C3C" 
        fill-opacity="0.3" 
        stroke="#B71C1C" 
        stroke-width="2.5" 
        stroke-linejoin="round"/>
  
  <!-- Jalur Pipa Utama (Lebih Tebal) -->
  <line x1="24" y1="12" x2="24" y2="30" 
        stroke="#B71C1C" 
        stroke-width="2" 
        stroke-linecap="round"/>
  
  <!-- Manifold / Katup Tengah -->
  <circle cx="24" cy="21" r="3" 
          stroke="#B71C1C" 
          stroke-width="1.5" 
          fill="#B71C1C" 
          fill-opacity="0.4"/>
  
  <!-- Anjungan Belakang (Bridge) yang Solid -->
  <rect x="19" y="34" width="10" height="5" rx="1.5" 
        fill="#B71C1C" 
        stroke="#B71C1C"
        stroke-width="1"/>

  <!-- Titik Indikator Haluan -->
  <circle cx="24" cy="8" r="2" fill="#B71C1C"/>
</svg>
