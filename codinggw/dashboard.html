<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIS Dashboard</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-slate-900 text-white min-h-screen">
    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- CONTENT -->
    <div class="ml-16 p-6">
      <h2 class="text-2xl font-semibold text-cyan-400 mb-6">
        AIS Vessel Statistics
      </h2>

      <!-- GRID -->
      <div
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4"
      >
        <div class="bg-slate-800 rounded-lg p-4 text-center shadow">
          <h3 class="text-sm text-slate-400">Total Vessels</h3>
          <div class="text-3xl font-bold text-cyan-400 mt-2" id="total">0</div>
        </div>

        <div class="bg-slate-800 rounded-lg p-4 text-center shadow">
          <h3 class="text-sm text-slate-400">Cargo Ships</h3>
          <div class="text-3xl font-bold text-cyan-400 mt-2" id="cargo">0</div>
        </div>

        <div class="bg-slate-800 rounded-lg p-4 text-center shadow">
          <h3 class="text-sm text-slate-400">Tanker</h3>
          <div class="text-3xl font-bold text-cyan-400 mt-2" id="tanker">0</div>
        </div>

        <div class="bg-slate-800 rounded-lg p-4 text-center shadow">
          <h3 class="text-sm text-slate-400">Passenger</h3>
          <div class="text-3xl font-bold text-cyan-400 mt-2" id="passenger">
            0
          </div>
        </div>

        <div class="bg-slate-800 rounded-lg p-4 text-center shadow">
          <h3 class="text-sm text-slate-400">Fishing</h3>
          <div class="text-3xl font-bold text-cyan-400 mt-2" id="fishing">
            0
          </div>
        </div>

        <div class="bg-slate-800 rounded-lg p-4 text-center shadow">
          <h3 class="text-sm text-slate-400">Others</h3>
          <div class="text-3xl font-bold text-cyan-400 mt-2" id="other">0</div>
        </div>
      </div>
    </div>

    <!-- SCRIPT -->
    <script type="module">
      import { loadSidebar } from "./assets/js/features/sidebarComponents.js";
      import { initSidebar } from "./assets/js/features/sidebar.js";
      import { initStats } from "./assets/js/features/stats.js";

      document.addEventListener("DOMContentLoaded", async () => {
        await loadSidebar(); // load sidebar HTML
        initSidebar(null); // dashboard tidak butuh map
        initStats(); // load stats
      });
    </script>
  </body>
</html>
