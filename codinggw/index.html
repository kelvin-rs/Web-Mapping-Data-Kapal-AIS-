<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ship Tracking</title>
    <!-- Leaflet -->
    <link rel="stylesheet" href="assets/css/leaflet.css" />
    <script src="assets/js/plugins/leaflet.js"></script>
    <link rel="stylesheet" href="assets/css/leafletdraw.css" />
    <script src="assets/js/plugins/leafletdraw.js"></script>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- CSS & JS untuk Leaflet Velocity (Animasi Angin) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet-velocity@1.6.0/dist/leaflet-velocity.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/leaflet-velocity@1.6.0/dist/leaflet-velocity.min.js"></script>
  </head>
  <body class="h-screen overflow-hidden bg-slate-900">
    <!-- SIDEBAR -->
    <div
      id="sidebar-container"
      class="group fixed top-0 left-0 h-full w-[4.5rem] hover:w-64 bg-[#0f172a]/95 backdrop-blur-xl border-r border-slate-800 z-[1000] transition-all duration-300 ease-in-out shadow-2xl overflow-visible flex flex-col py-6"
    ></div>

    <!-- SEARCH BAR -->
    <!-- SEARCH BAR MODERN -->
    <div
      class="fixed top-6 left-1/2 -translate-x-1/2 z-[1000] flex items-center bg-slate-900/90 backdrop-blur-xl border border-slate-700 shadow-[0_10px_40px_-10px_rgba(0,0,0,0.7)] rounded-full p-1.5 w-[300px] sm:w-[400px] transition-all duration-300 focus-within:border-cyan-500/50 focus-within:shadow-[0_0_20px_rgba(6,182,212,0.2)] sm:focus-within:w-[420px] group"
    >
      <!-- Ikon Kaca Pembesar -->
      <div
        class="pl-3 pr-2 text-slate-400 flex-shrink-0 group-focus-within:text-cyan-400 transition-colors"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="w-4 h-4"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
          />
        </svg>
      </div>

      <!-- Input Field -->
      <input
        id="search-input"
        type="text"
        placeholder="Search MMSI, Ship, Type, Country..."
        class="w-full bg-transparent text-sm text-slate-200 placeholder-slate-500 outline-none px-1"
        autocomplete="off"
      />

      <button
        id="search-clear-btn"
        class="hidden p-2 text-slate-400 hover:text-rose-400 transition-colors focus:outline-none"
      >
        <svg
          class="w-4 h-4"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>

      <button
        id="search-btn"
        class="bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 text-white px-5 py-2 rounded-full text-sm font-bold shadow-[0_0_15px_-3px_rgba(6,182,212,0.4)] transition-all active:scale-95 flex-shrink-0 ml-1"
      >
        Search
      </button>
    </div>

    <!-- MAP -->
    <div id="map" class="w-full h-full z-0"></div>

    <!-- VesselPanel -->
    <div
      id="vessel-detail-panel"
      class="fixed z-[9999] opacity-0 invisible transition-opacity duration-300 pointer-events-none shadow-2xl rounded-xl"
    >
      <div
        id="panel-content"
        class="relative bg-white w-[340px] rounded-xl overflow-hidden pointer-events-auto border border-slate-200"
      ></div>
    </div>

    <script src="assets/js/plugins/leaflet.rotatedMarker.js"></script>
    <script src="assets/js/plugins/weather.js"></script>
    <script type="module" src="assets/js/main.js?v=2"></script>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </body>
</html>
